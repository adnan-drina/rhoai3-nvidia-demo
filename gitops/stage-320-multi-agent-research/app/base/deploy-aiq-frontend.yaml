---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiq-frontend
  namespace: research-agents
  labels:
    project: aiq
    app: aiq-frontend
    component: frontend
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiq-frontend
  template:
    metadata:
      labels:
        app: aiq-frontend
        component: frontend
    spec:
      serviceAccountName: aiq-frontend
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: frontend
        image: quay.io/tasmith/aiq-frontend-redhat:2.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: "/"
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: "/"
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: "/"
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        env:
        - name: ENV
          value: ''
        - name: PORT
          value: '3000'
        - name: BACKEND_URL
          value: http://aiq-backend:8000
        - name: FILE_EXPIRATION_CHECK_INTERVAL_HOURS
          value: '0'
        - name: FILE_UPLOAD_ACCEPTED_TYPES
          value: ".pdf,.docx,.txt,.md"
        - name: FILE_UPLOAD_MAX_FILE_COUNT
          value: '10'
        - name: FILE_UPLOAD_MAX_SIZE_MB
          value: '100'
        - name: NEXT_PUBLIC_APP_DESCRIPTION
          value: Red Hat AI-powered research assistant
        - name: NEXT_PUBLIC_APP_TITLE
          value: Red Hat Research
        - name: NEXT_PUBLIC_DATADOG_ENABLED
          value: 'false'
        - name: NEXT_PUBLIC_FONTS_URL
          value: https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500;600;700&display=swap
        - name: NODE_ENV
          value: production
        - name: REQUIRE_AUTH
          value: 'false'
        - name: VLLM_API_KEY
          value: no-key
        envFrom:
        - secretRef:
            name: aiq-credentials
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
