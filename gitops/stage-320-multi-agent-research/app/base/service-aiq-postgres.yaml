---
apiVersion: v1
kind: Service
metadata:
  name: aiq-postgres
  namespace: research-agents
  labels:
    project: aiq
    app: aiq-postgres
    component: postgres
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  type: ClusterIP
  ports:
  - port: 5432
    protocol: TCP
    name: postgres
  selector:
    app: aiq-postgres
