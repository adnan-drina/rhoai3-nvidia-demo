---
apiVersion: v1
kind: Service
metadata:
  name: aiq-backend
  namespace: research-agents
  labels:
    project: aiq
    app: aiq-backend
    component: backend
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  type: ClusterIP
  ports:
  - port: 8000
    protocol: TCP
    name: http
  selector:
    app: aiq-backend
