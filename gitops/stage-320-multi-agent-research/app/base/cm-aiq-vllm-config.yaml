---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiq-vllm-config
  namespace: research-agents
  labels:
    project: aiq
    app: aiq-backend
    component: backend
  annotations:
    argocd.argoproj.io/sync-wave: '5'
data:
  config_web_vllm.yml: |
    general:
      use_uvloop: true
      telemetry:
        logging:
          console:
            _type: console
            level: INFO
      front_end:
        _type: aiq_api
        runner_class: aiq_api.plugin.AIQAPIWorker
        db_url: ${NAT_JOB_STORE_DB_URL:-sqlite+aiosqlite:///./jobs.db}
        expiry_seconds: 86400
        cors:
          allow_origin_regex: 'http://localhost(:\d+)?|http://127.0.0.1(:\d+)?'
          allow_methods:
            - GET
            - POST
            - DELETE
            - OPTIONS
          allow_headers:
            - "*"
          allow_credentials: true
          expose_headers:
            - "*"
    llms:
      intent_llm:
        _type: openai
        model_name: ${VLLM_INTENT_MODEL:-RedHatAI/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8}
        base_url: ${VLLM_INTENT_BASE_URL:-${VLLM_BASE_URL:-http://localhost:8000}}/v1
        api_key: ${VLLM_API_KEY}
        temperature: 0.5
        top_p: 0.9
        max_tokens: 4096
      researcher_llm:
        _type: openai
        model_name: ${VLLM_RESEARCHER_MODEL:-RedHatAI/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8}
        base_url: ${VLLM_BASE_URL:-http://localhost:8000}/v1
        api_key: ${VLLM_API_KEY}
        temperature: 0.1
        top_p: 0.3
        max_tokens: 16384
      orchestrator_llm:
        _type: openai
        model_name: ${VLLM_ORCHESTRATOR_MODEL:-RedHatAI/gpt-oss-120b}
        base_url: ${VLLM_ORCHESTRATOR_BASE_URL:-${VLLM_BASE_URL:-http://localhost:8000}}/v1
        api_key: ${VLLM_API_KEY}
        temperature: 1.0
        top_p: 1.0
        max_tokens: 65536
      summary_llm:
        _type: openai
        model_name: ${VLLM_SUMMARY_MODEL:-nvidia/Nemotron-Mini-4B-Instruct}
        base_url: ${VLLM_SUMMARY_BASE_URL:-${VLLM_BASE_URL:-http://localhost:8000}}/v1
        api_key: ${VLLM_API_KEY}
        temperature: 0.3
        max_tokens: 100
    functions:
      # =========================================================================
      # Data Source Registry
      # =========================================================================
      # Central registry that controls UI toggles and tool auto-inheritance
      # =========================================================================
      data_sources:
        _type: data_source_registry
        sources:
          - id: web_search
            name: "Web Search"
            description: "Search the web for real-time information."
            tools:
              - web_search_tool
              - advanced_web_search_tool
          - id: knowledge_layer
            name: "Knowledge Base"
            description: "Search uploaded documents and files."
            tools:
              - knowledge_search
          - id: paper_search
            name: "Academic Papers"
            description: "Search academic papers and scientific publications."
            tools:
              - paper_search_tool

      web_search_tool:
        _type: tavily_web_search
        max_results: 5
        max_content_length: 1000

      advanced_web_search_tool:
        _type: tavily_web_search
        max_results: 2
        advanced_search: true

      paper_search_tool:
        _type: paper_search
        max_results: 5
        serper_api_key: ${SERPER_API_KEY}

      knowledge_search:
        _type: knowledge_retrieval
        backend: llamaindex
        collection_name: ${COLLECTION_NAME:-test_collection}
        generate_summary: true
        summary_model: summary_llm
        summary_db: ${AIQ_SUMMARY_DB:-sqlite+aiosqlite:///./summaries.db}
        top_k: 5
        chroma_dir: ${AIQ_CHROMA_DIR:-/tmp/chroma_data}

      # =========================================================================
      # Agents
      # =========================================================================
      # Tool inheritance: agents with no `tools` list inherit ALL tools from the
      # data_source_registry above. Use `exclude_tools` to remove specific tools.
      # =========================================================================
      intent_classifier:
        _type: intent_classifier
        llm: intent_llm
        # tools: omitted -> inherits all from data_source_registry
        verbose: true

      clarifier_agent:
        _type: clarifier_agent
        llm: researcher_llm
        planner_llm: researcher_llm
        # tools: omitted -> inherits all from data_source_registry
        max_turns: 3
        enable_plan_approval: true
        log_response_max_chars: 2000
        verbose: true

      shallow_research_agent:
        _type: shallow_research_agent
        llm: researcher_llm
        # tools: omitted -> inherits all from data_source_registry
        exclude_tools:
          - advanced_web_search_tool  # Remove advanced variant; shallow uses web_search_tool
        verbose: true
        max_llm_turns: 10
        max_tool_iterations: 5

      deep_research_agent:
        _type: deep_research_agent
        orchestrator_llm: orchestrator_llm
        researcher_llm: researcher_llm
        planner_llm: orchestrator_llm
        # tools: omitted -> inherits all from data_source_registry
        exclude_tools:
          - web_search_tool  # Remove basic variant; deep uses advanced_web_search_tool
        max_loops: 2
        verbose: true
    workflow:
      _type: chat_deepresearcher_agent
      verbose: true
      enable_escalation: true
      enable_clarifier: true
      use_async_deep_research: true
      checkpoint_db: ${AIQ_CHECKPOINT_DB:-./checkpoints.db}
