      <rect width="48" height="48" rx="8" fill="#76b900"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#ffffff" stroke-width="3.5"/>
      <rect x="26" y="26" width="13" height="4" rx="2" transform="rotate(45 26 26)" fill="#ffffff"/>
    </svg>
  route: aiq-frontend
  routeNamespace: research-agents
  kfdefApplications: []
  csvName: ""
  quickStart: ""
