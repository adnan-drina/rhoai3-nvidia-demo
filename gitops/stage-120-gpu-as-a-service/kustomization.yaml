apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GPU MachineSets are generated by deploy.sh from the live worker template
# (cluster-specific infra ID/AMI/subnet); everything else is ArgoCD-managed.
resources:
  - nfd/operator/base
  - nfd/instance/base
  - gpu-operator/operator/base
  - gpu-operator/instance/base
  - kueue/operator/base
  - kueue/instance/base
  - rhoai/hardware-profiles/base
  - monitoring/base
