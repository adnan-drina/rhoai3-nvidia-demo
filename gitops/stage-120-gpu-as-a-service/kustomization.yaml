apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Instance CRs (NodeFeatureDiscovery, ClusterPolicy, Kueue, queues, hardware
# profiles) are added after live CRD verification per PLAN.md. GPU
# MachineSets are generated by deploy.sh from the live worker template
# because they embed cluster-specific infra IDs, AMIs, and subnets.
resources:
  - nfd/operator/base
  - gpu-operator/operator/base
  - kueue/operator/base
