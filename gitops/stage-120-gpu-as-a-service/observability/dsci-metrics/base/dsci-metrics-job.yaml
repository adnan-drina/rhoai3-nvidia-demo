# DSCI monitoring.metrics activation (rhoai-observability: a DSCI with
# monitoring Managed but empty metrics deploys NO metrics stack). Same
# hook pattern as dsc-activation; DSCI is operator-created, never
# authored.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-enable-dsci-metrics
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhoai-nvidia-demo-job-enable-dsci-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [dscinitialization.opendatahub.io]
    resources: [dscinitializations]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhoai-nvidia-demo-job-enable-dsci-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhoai-nvidia-demo-job-enable-dsci-metrics
subjects:
  - kind: ServiceAccount
    name: job-enable-dsci-metrics
    namespace: redhat-ods-applications
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-enable-dsci-metrics
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: job-enable-dsci-metrics
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              oc patch dscinitialization default-dsci --type merge -p '
                {"spec":{"monitoring":{"managementState":"Managed",
                  "namespace":"redhat-ods-monitoring",
                  "metrics":{"replicas":1,
                    "storage":{"size":"10Gi","retention":"7d"}}}}}'
              echo "DSCI monitoring.metrics configured."
