# From kueue-operator stable-v1.3 alm-examples; frameworks extended to the
# workload kinds RHOAI schedules (jobs, pods, deployments, statefulsets).
apiVersion: kueue.openshift.io/v1
kind: Kueue
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  managementState: Managed
  config:
    integrations:
      frameworks:
        - BatchJob
        - Pod
        - Deployment
        - StatefulSet
