# Local model serving (LLMInferenceService) runs in models-as-a-service per
# the proven rhoai3-demo pattern; this LocalQueue admits those workloads
# into the shared ClusterQueue.
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: default
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  clusterQueue: default
