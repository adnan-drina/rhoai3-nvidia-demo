# MaaS gateway per the PROVEN rhoai3-demo configuration: TLS terminates
# with maas-gateway-tls, a copy of the cluster's default ingress
# certificate (prepared by the wave-9 hook). This matters beyond routing:
# the dashboard MaaS module VALIDATES TLS against the discovered
# https://maas.<apps-domain> URL - a service-CA cert fails hostname
# verification and breaks the AI asset endpoints page ("Models as a
# Service could not be loaded"). Hostname placeholders are patched to the
# real cluster domain by the wave-11 hook.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  labels:
    opendatahub.io/managed: "false"
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: Prune=false
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: maas.placeholder.example.com
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      hostname: maas.placeholder.example.com
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: maas-gateway-tls
