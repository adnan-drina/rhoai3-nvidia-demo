# Document summary model. Public HF download (no token). Lands on the
# gpu-mig node's 2g.20gb slice.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: nemotron-mini-4b
  namespace: demo-sandbox
  labels:
    app: vllm
    kueue.x-k8s.io/queue-name: default
  annotations:
    serving.kserve.io/deploymentMode: Standard
    opendatahub.io/hardware-profile-name: mig-2g-20gb
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: hf://nvidia/Nemotron-Mini-4B-Instruct
      args:
        - --served-model-name=nvidia/Nemotron-Mini-4B-Instruct
        - --tensor-parallel-size=1
        - --max-model-len=4096
        - --gpu-memory-utilization=0.8
      resources:
        limits:
          nvidia.com/mig-2g.20gb: "1"
          memory: 24Gi
          cpu: "4"
        requests:
          nvidia.com/mig-2g.20gb: "1"
          memory: 16Gi
          cpu: "2"
