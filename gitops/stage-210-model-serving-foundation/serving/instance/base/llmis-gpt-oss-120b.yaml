# MaaS-governed local serving: LLMInferenceService is the only local model
# kind MaaSModelRef accepts (RHOAI 3.4). Pattern from
# opendatahub-io/models-as-a-service docs/samples/models (modelcar weights
# via spec.model.uri + Red Hat vLLM runtime image in the template; native
# binding to maas-default-gateway via router.gateway.refs).
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: gpt-oss-120b
  namespace: demo-sandbox
  labels:
    app: vllm
    kueue.x-k8s.io/queue-name: default
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/hardware-profile-name: h100-full
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
spec:
  model:
    uri: oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-120b:1.5
    name: RedHatAI/gpt-oss-120b
  replicas: 1
  router:
    route: {}
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
  template:
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    containers:
      - name: main
        image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:5800e12b2a465f15961fcf34b645d79ed4f91ec9161eab22b1205d12682183c8
        imagePullPolicy: IfNotPresent
        env:
          - name: VLLM_ADDITIONAL_ARGS
            value: "--max-model-len 131072 --gpu-memory-utilization 0.9 --enable-force-include-usage --enable-auto-tool-choice --tool-call-parser openai"
        resources:
          requests:
            nvidia.com/gpu: "1"
            memory: 100Gi
            cpu: "8"
          limits:
            nvidia.com/gpu: "1"
            memory: 160Gi
            cpu: "12"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 15
          failureThreshold: 60
