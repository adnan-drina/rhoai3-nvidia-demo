# Intent classifier + researcher. Community modelcar URI from the rh-research
# quickstart branch (no Red Hat-hosted modelcar published for this model at
# port time). Lands on the gpu-mig node's 3g.40gb slice.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: nemotron-nano-30b
  namespace: demo-sandbox
  labels:
    app: vllm
    kueue.x-k8s.io/queue-name: default
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/hardware-profile-name: mig-3g-40gb
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: oci://quay.io/jharmison/models:redhatai--nvidia-nemotron-3-nano-30b-a3b-fp8-modelcar
      args:
        - --served-model-name=RedHatAI/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8
        - --max-model-len=131072
        - --gpu-memory-utilization=0.85
        - --enable-force-include-usage
        - --enable-auto-tool-choice
        - --tool-call-parser=qwen3_coder
        - --trust-remote-code
        - --reasoning-parser-plugin=/mnt/models/nano_v3_reasoning_parser.py
        - --reasoning-parser=nano_v3
      resources:
        limits:
          nvidia.com/mig-3g.40gb: "1"
          memory: 32Gi
          cpu: "4"
        requests:
          nvidia.com/mig-3g.40gb: "1"
          memory: 24Gi
          cpu: "2"
