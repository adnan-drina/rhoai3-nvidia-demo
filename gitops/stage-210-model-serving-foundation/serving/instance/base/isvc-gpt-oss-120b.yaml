# Deep-research orchestrator/planner. Red Hat modelcar (no HF token needed).
# Lands on the gpu-full node (full H100 80GB) via the h100-full hardware
# profile; explicit resources/tolerations are the deterministic GitOps truth.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gpt-oss-120b
  namespace: demo-sandbox
  labels:
    app: vllm
    kueue.x-k8s.io/queue-name: default
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/hardware-profile-name: h100-full
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-120b:1.5
      name: ""
      args:
        - --served-model-name=RedHatAI/gpt-oss-120b
        - --tensor-parallel-size=1
        - --max-model-len=131072
        - --gpu-memory-utilization=0.9
        - --enable-force-include-usage
        - --enable-auto-tool-choice
        - --tool-call-parser=openai
      resources:
        limits:
          nvidia.com/gpu: "1"
          memory: 160Gi
          cpu: "12"
        requests:
          nvidia.com/gpu: "1"
          memory: 100Gi
          cpu: "8"
