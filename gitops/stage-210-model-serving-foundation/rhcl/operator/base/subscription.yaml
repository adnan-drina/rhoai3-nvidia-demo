# Red Hat Connectivity Link (Kuadrant) pinned to the CSV validated in the
# proven rhoai3-demo configuration. Newer RHCL CSVs (e.g. v1.4.x) generate
# Gateway WASM configuration that the OpenShift gateway rejects / installs
# as a raw EnvoyFilter, which breaks the RHOAI payload-processing ext-proc
# anchor (external-model path rewrite + provider API-key injection).
# Manual InstallPlan approval + the approve Job keep OLM from drifting.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhcl-operator
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
    argocd.argoproj.io/sync-wave: "3"
spec:
  channel: stable
  installPlanApproval: Manual
  name: rhcl-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: rhcl-operator.v1.3.4
