# GitOps-owned Authorino CR with listener TLS (replaces the earlier
# imperative bootstrap; proven rhoai3-demo pattern).
apiVersion: operator.authorino.kuadrant.io/v1beta1
kind: Authorino
metadata:
  name: authorino
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Prune=false
spec:
  clusterWide: true
  replicas: 1
  listener:
    tls:
      enabled: true
      certSecretRef:
        name: authorino-server-cert
  oidcServer:
    tls:
      enabled: false
