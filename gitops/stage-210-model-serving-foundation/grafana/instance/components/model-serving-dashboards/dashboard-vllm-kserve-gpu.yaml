apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: vllm-model-serving-baseline
  namespace: rhoai-demo-grafana
  labels:
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/name: vllm-model-serving-baseline
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "13"
spec:
  folder: RHOAI Demo
  instanceSelector:
    matchLabels:
      instance: rhoai-demo-grafana
  resyncPeriod: 30s
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(vllm:time_to_first_token_seconds_bucket{model_name=~\"$model\"}[5m])))",
              "legendFormat": "p95 TTFT",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(vllm:inter_token_latency_seconds_bucket{model_name=~\"$model\"}[5m])))",
              "legendFormat": "p95 inter-token latency",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model\"}[5m])))",
              "legendFormat": "p95 end-to-end latency",
              "refId": "C"
            }
          ],
          "title": "vLLM latency baseline",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(vllm:num_requests_running{model_name=~\"$model\"})",
              "legendFormat": "running",
              "refId": "A"
            },
            {
              "expr": "sum(vllm:num_requests_waiting{model_name=~\"$model\"})",
              "legendFormat": "waiting",
              "refId": "B"
            },
            {
              "expr": "sum(rate(vllm:request_success_total{model_name=~\"$model\"}[5m]))",
              "legendFormat": "completed rps",
              "refId": "C"
            }
          ],
          "title": "Request pressure",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "tps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(vllm:prompt_tokens_total{model_name=~\"$model\"}[5m]))",
              "legendFormat": "prompt tokens/sec",
              "refId": "A"
            },
            {
              "expr": "sum(rate(vllm:generation_tokens_total{model_name=~\"$model\"}[5m]))",
              "legendFormat": "generation tokens/sec",
              "refId": "B"
            }
          ],
          "title": "Token throughput",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 60
                  },
                  {
                    "color": "red",
                    "value": 85
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 4,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "max(max_over_time(vllm:kv_cache_usage_perc{model_name=~\"$model\"}[$__range])) * 100",
              "legendFormat": "peak KV cache usage",
              "refId": "A"
            }
          ],
          "title": "Peak KV cache pressure",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 8
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "100 * sum(increase(vllm:prefix_cache_hits_total{model_name=~\"$model\"}[$__range])) / clamp_min(sum(increase(vllm:prefix_cache_queries_total{model_name=~\"$model\"}[$__range])), 1)",
              "legendFormat": "prefix cache hit ratio",
              "refId": "A"
            }
          ],
          "title": "Prefix cache effectiveness",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "max(max_over_time(DCGM_FI_DEV_GPU_UTIL[$__rate_interval]))",
              "legendFormat": "peak GPU utilization",
              "refId": "A"
            },
            {
              "expr": "max(max_over_time((100 * DCGM_FI_DEV_FB_USED / clamp_min(DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE + DCGM_FI_DEV_FB_RESERVED, 1))[$__rate_interval:]))",
              "legendFormat": "framebuffer used",
              "refId": "B"
            }
          ],
          "title": "GPU utilization and memory (DCGM)",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "tags": [
        "rhoai",
        "vllm",
        "kserve",
        "gpu"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "definition": "label_values(vllm:num_requests_running, model_name)",
            "hide": 0,
            "includeAll": true,
            "label": "Model",
            "name": "model",
            "options": [],
            "query": {
              "query": "label_values(vllm:num_requests_running, model_name)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "vLLM Model Serving Baseline",
      "uid": "vllm-model-serving-baseline",
      "version": 1
    }
