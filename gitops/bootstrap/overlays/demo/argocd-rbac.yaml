# Demo-only: ArgoCD application controller runs with cluster-admin so stage
# Applications can manage operators, CRDs, and cluster-scoped CRs. Accepted
# for this demo and documented in docs/OPERATIONS.md.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-gitops-argocd-application-controller-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
