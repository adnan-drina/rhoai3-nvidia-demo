apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  resourceTrackingMethod: annotation
  extraConfig:
    resource.customizations.health.operators.coreos.com_Subscription: |
      hs = {}

      if obj.status ~= nil then
        if obj.spec ~= nil and
          obj.spec.installPlanApproval == "Manual" and
          obj.spec.startingCSV ~= nil and
          obj.status.installedCSV == obj.spec.startingCSV then
          hs.status = "Healthy"
          hs.message = "Installed pinned CSV " .. obj.status.installedCSV .. "; newer InstallPlan may remain pending by design"
          return hs
        end

        if obj.status.conditions ~= nil then
          for _, condition in ipairs(obj.status.conditions) do
            if condition.type == "CatalogSourcesUnhealthy" and condition.status == "True" then
              hs.status = "Degraded"
              hs.message = condition.message or "CatalogSourcesUnhealthy"
              return hs
            end
          end
        end

        if obj.status.state == "AtLatestKnown" then
          hs.status = "Healthy"
          hs.message = "AtLatestKnown"
          return hs
        end

        if obj.status.state ~= nil and obj.status.state ~= "" then
          hs.status = "Progressing"
          hs.message = obj.status.state
          return hs
        end
      end

      hs.status = "Progressing"
      hs.message = "Waiting for Subscription status"
      return hs
  controller:
    resources:
      limits:
        memory: 4Gi
      requests:
        memory: 2Gi
  server:
    route:
      enabled: true
      tls:
        termination: reencrypt
