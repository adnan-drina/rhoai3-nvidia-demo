apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  resourceTrackingMethod: annotation
  controller:
    resources:
      limits:
        memory: 4Gi
      requests:
        memory: 2Gi
  server:
    route:
      enabled: true
      tls:
        termination: reencrypt
