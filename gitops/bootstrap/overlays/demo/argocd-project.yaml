apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rhoai-nvidia-demo
  namespace: openshift-gitops
spec:
  description: Multi-Agent Research Workflows with Red Hat AI and NVIDIA
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
