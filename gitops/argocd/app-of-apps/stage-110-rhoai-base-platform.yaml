apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-110-rhoai-base-platform
  namespace: openshift-gitops
spec:
  project: rhoai-nvidia-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-nvidia-demo.git
    # Temporarily pinned to the active dev branch per AGENTS.md branching
    # policy (stage-120 patches the shared DSC owned here); restore to main
    # when stabilizing.
    targetRevision: main
    path: gitops/stage-110-rhoai-base-platform
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      # ignoreDifferences alone only masks drift detection; applies must
      # also respect it or stage-110 syncs stomp later-stage DSC
      # activations back to Removed (root cause of the 2026-07-08 MaaS
      # teardown).
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # Later stages activate these DSC components with GitOps hook Jobs
    # (stage 120: kueue; 210: kserve; 220: modelsAsService+llamastack;
    # 320: mlflow). Base Git keeps them Removed; ignore so selfHeal never
    # reverts an owning stage's activation.
    - group: datasciencecluster.opendatahub.io
      kind: DataScienceCluster
      name: default-dsc
      jsonPointers:
        - /spec/components/kueue
        - /spec/components/kserve
        - /spec/components/llamastackoperator
        - /spec/components/mlflowoperator
        - /spec/components/aipipelines
        - /spec/components/trustyai
