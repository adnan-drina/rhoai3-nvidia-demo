apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-210-model-serving-foundation
  namespace: openshift-gitops
spec:
  project: rhoai-nvidia-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-nvidia-demo.git
    # Temporarily pinned to the active dev branch per AGENTS.md branching
    # policy; restore to main when stabilizing.
    targetRevision: feat/stage-120
    path: gitops/stage-210-model-serving-foundation
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      # The gateway hostname is patched to the real cluster domain by a
      # sync hook (Git carries a placeholder); applies must respect the
      # ignored field or selfHeal oscillates/reverts it.
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: maas-default-gateway
      namespace: openshift-ingress
      jsonPointers:
        - /spec/listeners/0/hostname
        - /spec/listeners/1/hostname
