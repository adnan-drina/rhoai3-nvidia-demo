apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-320-multi-agent-research
  namespace: openshift-gitops
spec:
  project: rhoai-nvidia-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-nvidia-demo.git
    targetRevision: main
    path: gitops/stage-320-multi-agent-research
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
