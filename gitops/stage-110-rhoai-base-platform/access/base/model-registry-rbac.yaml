# Access to the demo-registry Model Registry: RHOAI generates the
# registry-user-demo-registry Role in rhoai-model-registries; users need a
# RoleBinding to it to see the registry in the dashboard.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-registry-rhoai-demo-admins
  namespace: rhoai-model-registries
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: registry-user-demo-registry
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-demo-admins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-registry-rhoai-demo-users
  namespace: rhoai-model-registries
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: registry-user-demo-registry
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-demo-users
