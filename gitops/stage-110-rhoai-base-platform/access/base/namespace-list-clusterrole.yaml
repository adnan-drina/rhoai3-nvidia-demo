# The MaaS dashboard module (AI asset endpoints) lists namespaces with the
# LOGGED-IN USER's token (verified from maas-ui logs: the 403 for ai-admin
# rendered "Models as a Service could not be loaded"). Narrowest grant:
# namespace metadata get/list for the demo persona groups. Demo posture,
# user-approved 2026-07-08.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhoai-nvidia-demo-namespace-reader
  annotations:
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhoai-nvidia-demo-namespace-reader
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhoai-nvidia-demo-namespace-reader
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-demo-admins
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-demo-users
