# Base-platform DataScienceCluster: ONLY Stage 110 components are Managed.
# Components owned by later stages are explicitly Removed here (product
# recommendation: "install it or change component state to Removed") and
# are activated by the owning stage via a GitOps sync-hook Job
# (dsc-activation) - the proven rhoai3-demo pattern. The stage-110
# Application carries ignoreDifferences for those component fields so
# selfHeal never reverts a later stage's activation.
# DSCInitialization is not authored: rhods-operator auto-creates
# default-dsci (verified live). Schema: live DSC v2 CRD.
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    aipipelines:
      managementState: Removed
    feastoperator:
      managementState: Removed
    kserve:
      managementState: Removed
    kueue:
      managementState: Removed
    llamastackoperator:
      managementState: Removed
    mlflowoperator:
      managementState: Removed
    ray:
      managementState: Removed
    sparkoperator:
      managementState: Removed
    trainer:
      managementState: Removed
    trainingoperator:
      managementState: Removed
    trustyai:
      managementState: Removed
