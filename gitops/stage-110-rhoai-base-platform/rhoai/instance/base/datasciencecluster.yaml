# DataScienceCluster owned by Stage 110; later stages patch components here
# (Stage 120: kueue, Stage 210: kserve, Stage 320: mlflowoperator).
# DSCInitialization is not authored: rhods-operator 3.4.2 auto-creates
# default-dsci (verified live 2026-07-07).
# Schema verified against live DSC v2 CRD (oc explain, cluster-48jqq).
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    aipipelines:
      managementState: Removed
    feastoperator:
      managementState: Removed
    kserve:
      managementState: Removed
    # Stage 120: Unmanaged delegates to the Red Hat build of Kueue operator
    # (Managed is rejected at runtime in RHOAI 3.4); queue names match the
    # ClusterQueue/LocalQueue authored in gitops/stage-120-gpu-as-a-service.
    kueue:
      managementState: Unmanaged
      defaultClusterQueueName: default
      defaultLocalQueueName: default
    llamastackoperator:
      managementState: Removed
    mlflowoperator:
      managementState: Removed
    ray:
      managementState: Removed
    sparkoperator:
      managementState: Removed
    trainer:
      managementState: Removed
    trainingoperator:
      managementState: Removed
    trustyai:
      managementState: Removed
