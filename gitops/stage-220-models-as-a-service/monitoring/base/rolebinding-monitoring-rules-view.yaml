apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  # The RHOAI managing-and-monitoring-models guide grants monitoring users the
  # cluster-scoped monitoring-rules-view role in the model namespace so they
  # can read the serving PrometheusRules and alerts without cluster-admin.
  name: rhoai-demo-monitoring-rules-view
  namespace: models-as-a-service
  labels:
    app.kubernetes.io/part-of: rhoai3-nvidia-demo
    app.kubernetes.io/name: monitoring-rules-view
    app.kubernetes.io/component: access-control
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monitoring-rules-view
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-demo-users
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhods-admins
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-demo-admins
