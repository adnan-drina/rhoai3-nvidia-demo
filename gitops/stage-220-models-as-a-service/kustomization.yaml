apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The maas-default-gateway Gateway and its self-signed TLS secret are
# created by deploy.sh (cluster-specific hostname/cert), mirroring the
# MachineSet precedent. DSC modelsAsService enablement lives in stage-110's
# DSC overlay (CoP component patch components/maas).
resources:
  - maas-db/instance/base
  - maas-subscriptions/base
  - maas-registration/base
  - dsc-activation/base
