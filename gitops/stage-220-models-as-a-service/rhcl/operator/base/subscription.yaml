# Red Hat Connectivity Link (Kuadrant): authentication, authorization, and
# rate limiting for MaaS per RHOAI 3.4 "Govern LLM access with MaaS".
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhcl-operator
  namespace: kuadrant-system
spec:
  channel: stable
  installPlanApproval: Automatic
  name: rhcl-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  config:
    env:
      # Upstream MaaS prerequisite: tells Kuadrant it runs on the OpenShift
      # gateway controller so it injects its shim as a WasmPlugin. Without
      # this, RHOAI's payload-processing EnvoyFilter anchor (subFilter
      # wasmplugin/...) never matches and the ext-proc (path rewrite +
      # provider API-key injection for ExternalModels) never installs -
      # external completions then 404 at the provider.
      - name: ISTIO_GATEWAY_CONTROLLER_NAME
        value: openshift.io/gateway-controller/v1
