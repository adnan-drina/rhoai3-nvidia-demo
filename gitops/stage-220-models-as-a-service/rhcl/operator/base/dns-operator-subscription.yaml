# Pinned RHCL dependency (proven rhoai3-demo config): prevents OLM
# dependency resolution from pulling 1.4-line versions that break the
# gateway WASM anchoring.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: dns-operator-stable-redhat-operators-openshift-marketplace
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
    argocd.argoproj.io/sync-wave: "3"
spec:
  channel: stable
  installPlanApproval: Manual
  name: dns-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: dns-operator.v1.3.1
