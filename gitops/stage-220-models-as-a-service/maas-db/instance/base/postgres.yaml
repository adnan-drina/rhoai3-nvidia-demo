# PostgreSQL backend for maas-api (API key metadata, subscriptions,
# revocation). Pattern from opendatahub-io/models-as-a-service
# scripts/setup-database.sh (postgresql-16 POC deployment). The
# maas-db-credentials and maas-db-config Secrets are created by stage-220
# deploy.sh and never committed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-db
  namespace: redhat-ods-applications
  labels:
    app: maas-db
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maas-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: maas-db
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: maas-db-credentials
                  key: database-name
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: maas-db-credentials
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maas-db-credentials
                  key: database-password
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: maas-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maas-db
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: maas-db
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  selector:
    app: maas-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
