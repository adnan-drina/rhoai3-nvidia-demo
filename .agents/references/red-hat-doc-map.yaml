  odf:
    name: Red Hat OpenShift Data Foundation
    baseline_component: Red Hat OpenShift Data Foundation
    skill_prefix: odf-
    rule: .agents/rules/odf.md
    documentation_root: https://docs.redhat.com/en/documentation/red_hat_openshift_data_foundation/
    active_baseline_root: https://docs.redhat.com/en/documentation/red_hat_openshift_data_foundation/4.20/
    status: active
    note: >
      ODF is pinned to 4.20 to match the OCP 4.20 baseline. The demo should
      start with the minimum ODF footprint needed for RHOAI object storage:
      standalone Multicloud Object Gateway, NooBaa, and ObjectBucketClaims.
      Full StorageCluster/Ceph guidance is covered for cases where the demo
      needs ODF-provided block or file storage.
    categories:
      planning:
        routes:
          - book: planning_your_deployment
            status: active
            skill: odf-storagecluster
          - book: red_hat_openshift_data_foundation_architecture
