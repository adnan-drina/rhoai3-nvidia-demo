route_update_rules:
  when_adding_skill:
    - Add a route with product, category, book, status, and skill.
    - Keep the skill path flat under .agents/skills/<skill-name>/.
    - Update the matching .agents/rules/<family>.md file.
    - Update AGENTS.md and project skill inventories only if they explicitly
      list skill names.
  when_upgrading_product:
    - Update docs/PLATFORM_BASELINE.md first.
    - Review active_baseline_root values here.
    - Recheck routes whose official documentation book or chapter changed.
    - Prefer updating existing skills over creating versioned skill names.
