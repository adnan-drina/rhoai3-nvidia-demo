schema_version: 1
owner: project-red-hat-doc-skill-authoring
baseline_source: docs/PLATFORM_BASELINE.md
purpose: >
  Route official Red Hat documentation sources to flat repo skills. This file
  references Red Hat documentation products, versions, categories, books, and
  topics, but uses repo-specific routing categories where useful. It does not
  mirror the documentation hierarchy in .agents/skills/.

usage:
  - Read docs/PLATFORM_BASELINE.md first and verify the product version.
  - Match a source by product, version, category, book, and chapter topic.
  - Prefer an existing mapped skill before creating a new one.
  - If a required topic is missing, create or update a flat skill folder and
    add a new route here.
  - Do not create nested skill folders to match documentation categories.
  - Keep exact product versions in docs/PLATFORM_BASELINE.md; this map points
    to that baseline and may include current root URLs for discoverability.

status_values:
  active: Skill exists and is the preferred route.
  planned: Skill does not exist yet but the route is expected.
  blocked-baseline: Do not create until docs/PLATFORM_BASELINE.md pins a version.

source_types:
  docs_redhat_com: Versioned Red Hat product documentation on docs.redhat.com.
  customer_portal_article: Red Hat Customer Portal article or lifecycle policy
    outside docs.redhat.com.
  external_redhat_product_docs: Versioned docs.redhat.com documentation for a
    Red Hat product outside the current product family.
  repo_specific: Repo-owned guidance that is grounded in official docs but is
    not itself a Red Hat documentation book.

